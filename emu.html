<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMU</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #container { width: 100%; height: 100%; }
        #container canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div id="container"><canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas></div>
    <script>
        function checkControls() { try { parent.onEmulatorReady(); } catch(e) {} }
        function isMobileDevice() { return false; }

        var container_width, container_height;
        var emuAttempted = false;
        var emuSuccess = false;

        // Report status to parent loading screen
        function reportStatus(msg) {
            console.warn("[EMU] " + msg);
            try { parent.document.getElementById("load-status").textContent = msg; } catch(e) {}
        }

        function cancelMainLoop() {
            try {
                Browser.mainLoop.currentlyRunningMainloop++;
                Browser.mainLoop.func = null;
                reportStatus("Main loop cancelled");
            } catch(e) { reportStatus("cancelMainLoop: " + e); }
        }

        function startEmulator() {
            if (emuSuccess) return; // Already started successfully
            emuAttempted = true;
            var romName = "spf2xj.zip";
            try { romName = parent.ROMNAME; } catch(e) {}
            reportStatus("Starting game: " + romName);

            container_width = document.getElementById("container").offsetWidth || window.innerWidth;
            container_height = document.getElementById("container").offsetHeight || window.innerHeight;

            cancelMainLoop();
            Emulator_started = false;
            Emulator_running = true;

            try {
                Module.callMain(["/" + romName]);
                reportStatus("callMain OK, waiting for frames...");
            } catch(e) {
                reportStatus("callMain error: " + e);
            }

            document.getElementById("canvas").width = container_width;
            document.getElementById("canvas").height = container_height;
            setTimeout(resizeCanvas, 500);
            setTimeout(resizeCanvas, 1500);
            setTimeout(resizeCanvas, 3000);

            // FRAME-KICK: On mobile Chrome/Firefox, requestAnimationFrame may not
            // fire for iframes. After a brief wait, check if frames are flowing.
            // If not, replace the rAF-based scheduler with setTimeout-based one.
            setTimeout(function() {
                try {
                    var framesBefore = Browser.mainLoop.currentFrameNumber || 0;
                    // First kick to get things started
                    if (framesBefore === 0 && Browser.mainLoop.runner) {
                        setTimeout(Browser.mainLoop.runner, 0);
                    }
                    // Check again after 500ms — if still no frames, patch scheduler
                    setTimeout(function() {
                        try {
                            var framesNow = Browser.mainLoop.currentFrameNumber || 0;
                            if (framesNow < 2) {
                                reportStatus("rAF not working, switching to setTimeout scheduler");
                                // Replace the rAF scheduler with setTimeout at ~60fps
                                Browser.mainLoop.scheduler = function() {
                                    setTimeout(Browser.mainLoop.runner, 1000 / 60);
                                };
                                // Kick the first frame under new scheduler
                                if (Browser.mainLoop.runner) {
                                    setTimeout(Browser.mainLoop.runner, 0);
                                }
                            } else {
                                reportStatus("rAF working fine, frames: " + framesNow);
                            }
                        } catch(e) { reportStatus("Scheduler patch error: " + e); }
                    }, 500);
                } catch(e) { reportStatus("Kick error: " + e); }
            }, 200);
        }

        function resizeCanvas() {
            try {
                container_width = document.getElementById("container").offsetWidth || window.innerWidth;
                container_height = document.getElementById("container").offsetHeight || window.innerHeight;
                Module.setCanvasSize(container_width, container_height, true);
            } catch(e) {}
        }

        // Keep Emulator_running true and report started to parent
        setInterval(function() {
            try {
                if (typeof Emulator_running !== "undefined") Emulator_running = true;
                if (typeof Emulator_started !== "undefined" && Emulator_started === true) {
                    if (!emuSuccess) {
                        emuSuccess = true;
                        reportStatus("Game running!");
                    }
                    try { parent.onEmulatorStarted(); } catch(e) {}
                }
            } catch(e) {}
        }, 500);

        window.addEventListener("resize", resizeCanvas);

        // === STARTUP SEQUENCE ===
        // Track stages for debugging
        var stage = "init";

        window.addEventListener("load", function() {
            stage = "loaded";
            reportStatus("Core JS loaded, compiling WASM...");

            var startTime = Date.now();
            var attempts = 0;

            var checker = setInterval(function() {
                var elapsed = Math.round((Date.now() - startTime) / 1000);
                try {
                    if (Module && Module.calledRun === true) {
                        clearInterval(checker);
                        stage = "runtime_ready";
                        reportStatus("WASM ready (" + elapsed + "s), starting in 2s...");
                        setTimeout(startEmulator, 2000);
                        return;
                    }
                } catch(e) {}

                // Status updates while waiting
                if (elapsed % 5 === 0 && elapsed > 0) {
                    reportStatus("Compiling WASM... " + elapsed + "s");
                }

                // Fallback: if WASM takes >20s, try starting anyway
                if (elapsed > 20 && !emuAttempted) {
                    clearInterval(checker);
                    stage = "timeout_fallback";
                    reportStatus("WASM timeout, attempting start...");
                    try {
                        if (Module && typeof Module.callMain === "function") {
                            startEmulator();
                        } else {
                            reportStatus("Module.callMain not available");
                        }
                    } catch(e) {
                        reportStatus("Fallback start error: " + e);
                    }
                }
            }, 500);
        });

        // Error recovery — retry callMain on errors
        var errorRetryCount = 0;
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            reportStatus("Error: " + msg);
            errorRetryCount++;
            if (errorRetryCount > 3) return true; // Stop retrying after 3 attempts

            setTimeout(function() {
                try {
                    var romName = "spf2xj.zip";
                    try { romName = parent.ROMNAME; } catch(e) {}
                    reportStatus("Retry #" + errorRetryCount + " — " + romName);
                    cancelMainLoop();
                    Emulator_started = false;
                    Emulator_running = true;
                    Module.callMain(["/" + romName]);
                    container_width = document.getElementById("container").offsetWidth || window.innerWidth;
                    container_height = document.getElementById("container").offsetHeight || window.innerHeight;
                    document.getElementById("canvas").width = container_width;
                    document.getElementById("canvas").height = container_height;
                    // Frame-kick for retry path — patch scheduler if rAF broken
                    setTimeout(function() {
                        try {
                            if (Browser.mainLoop.runner) setTimeout(Browser.mainLoop.runner, 0);
                            setTimeout(function() {
                                try {
                                    if ((Browser.mainLoop.currentFrameNumber || 0) < 2) {
                                        Browser.mainLoop.scheduler = function() {
                                            setTimeout(Browser.mainLoop.runner, 1000 / 60);
                                        };
                                        if (Browser.mainLoop.runner) setTimeout(Browser.mainLoop.runner, 0);
                                    }
                                } catch(e) {}
                            }, 500);
                        } catch(e) {}
                    }, 200);
                } catch(e) { reportStatus("Retry error: " + e); }
            }, 3000);
            return true;
        };
    </script>
    <script src="emu_core3.js"></script>
</body>
</html>
